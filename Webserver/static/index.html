<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebServer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #0c0c1d 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 60px 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            max-width: 700px;
            width: 90%;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #888; font-size: 1.1em; margin-bottom: 40px; }
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 20px 30px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #00d2ff;
        }
        .stat-label { font-size: 0.85em; color: #888; margin-top: 5px; }
        .tech-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .tag {
            background: rgba(123,47,247,0.2);
            color: #b388ff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            border: 1px solid rgba(123,47,247,0.3);
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #4caf50;
            font-size: 0.95em;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .footer { margin-top: 30px; color: #555; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>C++ WebServer</h1>
        <p class="subtitle">Reactor Model / High Concurrency / epoll ET</p>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value">5800+</div>
                <div class="stat-label">QPS</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">500+</div>
                <div class="stat-label">Concurrent Connections</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">25ms</div>
                <div class="stat-label">Avg Latency</div>
            </div>
        </div>

        <div class="tech-tags">
            <span class="tag">C++17</span>
            <span class="tag">Linux</span>
            <span class="tag">epoll ET</span>
            <span class="tag">Thread Pool</span>
            <span class="tag">Reactor</span>
            <span class="tag">Min-Heap Timer</span>
            <span class="tag">HTTP</span>
        </div>

        <div class="status">
            <span class="status-dot"></span>
            Server Running
        </div>

        <div class="footer">Powered by Custom C++ HTTP Server on Linux</div>
    </div>
</body>
</html>
